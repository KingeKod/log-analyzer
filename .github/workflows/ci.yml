name: CI Log Analyzer

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: |
          uv python install 3.13
          uv python pin 3.13

      - name: Sync dependencies
        run: |
          uv sync --python 3.13
          uv sync --dev

      - name: Run flake8
        run: |
          uv run flake8 src tests

      - name: Run black check
        run: |
          uv run black --check src tests

      - name: Run isort check
        run: |
          uv run isort --check-only src tests

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: |
          uv python install 3.13
          uv python pin 3.13

      - name: Sync dependencies
        run: |
          uv sync --python 3.13
          uv sync --dev

      - name: Run mypy
        run: |
          uv run mypy src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: |
          uv python install 3.13
          uv python pin 3.13

      - name: Sync dependencies
        run: |
          uv sync --python 3.13
          uv sync --dev

      - name: Run tests
        run: |
          uv run pytest
